<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แอปข้อสอบตำรวจ 150 ข้อ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .hidden { display: none !important; }
        .option-btn { display: block; width: 100%; margin-bottom: 10px; text-align: left; }
    </style>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div id="home-screen" class="text-center">
            <h1 class="mb-4">เตรียมสอบนายสิบตำรวจ</h1>
            <p>แบบทดสอบความรู้พื้นฐาน 150 ข้อ</p>
            <button onclick="startQuiz()" class="btn btn-primary btn-lg">เริ่มทำข้อสอบ</button>
        </div>

        <div id="quiz-screen" class="hidden" style="max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
            <h2 id="question" class="mb-4">กำลังโหลดข้อสอบ...</h2>
            <div id="options"></div>
            <div class="mt-4">
                <button onclick="nextQuestion()" class="btn btn-secondary">ข้ามข้อนี้</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
