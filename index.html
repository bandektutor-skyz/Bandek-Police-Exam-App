<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แอปข้อสอบตำรวจ 150 ข้อ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .hidden { display: none !important; }
        .option-btn { display: block; width: 100%; margin-bottom: 12px; text-align: left; padding: 12px; border-radius: 8px; transition: 0.3s; }
        .option-btn:hover { background-color: #f0f7ff; border-color: #007bff; }
        #quiz-screen { max-width: 800px; margin: 20px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div id="home-screen" class="text-center py-5">
            <h1 class="display-5 fw-bold mb-4">เตรียมสอบนายสิบตำรวจ</h1>
            <p class="lead mb-4">แบบทดสอบความรู้พื้นฐาน รวม 150 ข้อ</p>
            <button onclick="startQuiz()" class="btn btn-primary btn-lg px-5 shadow">เริ่มทำข้อสอบ</button>
        </div>

        <div id="quiz-screen" class="hidden">
            <div class="d-flex justify-content-between mb-3 text-muted">
                <span id="progress-text">ข้อที่ 1</span>
                <span id="score-text">คะแนน: 0</span>
            </div>
            <h3 id="question" class="mb-4 fw-normal">กำลังโหลดโจทย์...</h3>
            <div id="options" class="d-grid gap-2"></div>
            <hr class="my-4">
            <div class="d-flex justify-content-end">
                <button onclick="nextQuestion()" class="btn btn-outline-secondary">ข้ามข้อนี้</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
